version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: urlshortener-postgres
    restart: always

    environment:
      POSTGRES_DB: UrlShortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d UrlShortener"]      
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/UrlShortener.Api/Dockerfile

    container_name: urlshortener-api

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=UrlShortener;Username=postgres;Password=postgres

volumes:
  postgres-data: